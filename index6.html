<html lang="en">
<head>

    <title>student registration</title>
</head>
<body>

    </header>

            <label>Name:</label><br>

                <option>JAVASCRIPT</option>

            <label>Skills:</label><br>
            <input type="checkbox">HTML<br><br>

            <input type="radio">female<br><br>
            <label>upload passport:</label><br>
            <input type="file"><br><br>

        </form>
    </section>
    <section>
        <h2>progress</h2>
        <progress value="30" max="100"></progress>
    </section>
    <footer>
        <p>@2026 Tech Class</p>
    </footer>

</html>
